name: CI

on:
  push:
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10.34.4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Full validation
        run: pnpm run full

      - name: Consumer type smoke test
        run: |
          TMP_DIR="$(mktemp -d)"
          cat > "$TMP_DIR/consumer.ts" <<EOF
          import type { FileInputPropsType } from '${GITHUB_WORKSPACE}/dist/components/Form/FileInput/types';
          const value: FileInputPropsType | null = null;
          console.log(value);
          EOF
          cat > "$TMP_DIR/tsconfig.json" <<'EOF'
          {
            "compilerOptions": {
              "target": "ES2020",
              "module": "ESNext",
              "moduleResolution": "Bundler",
              "strict": true,
              "skipLibCheck": false,
              "noEmit": true
            },
            "include": ["consumer.ts"]
          }
          EOF
          pnpm exec tsc -p "$TMP_DIR/tsconfig.json"
