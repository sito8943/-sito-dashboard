name: CI

on:
  push:
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.19.0
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Full validation
        run: npm run full

      - name: Consumer type smoke test
        run: |
          TMP_DIR="$(mktemp -d)"
          cat > "$TMP_DIR/consumer.ts" <<EOF
          import type { FileInputPropsType } from '${GITHUB_WORKSPACE}/dist/components/Form/FileInput/types';
          const value: FileInputPropsType | null = null;
          console.log(value);
          EOF
          cat > "$TMP_DIR/tsconfig.json" <<'EOF'
          {
            "compilerOptions": {
              "target": "ES2020",
              "module": "ESNext",
              "moduleResolution": "Bundler",
              "strict": true,
              "skipLibCheck": false,
              "noEmit": true
            },
            "include": ["consumer.ts"]
          }
          EOF
          npx tsc -p "$TMP_DIR/tsconfig.json"
